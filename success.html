<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement confirmé - InstaScore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="status-page">

  <div class="status-card">
    <div class="status-icon" style="background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 197, 94, 0.2)); border-color: rgba(74, 222, 128, 0.3);">✓</div>
    <h1>Paiement confirmé</h1>
    <p>Ton accès Premium est activé ! Redirection en cours...</p>
    
    <div class="status" id="status" style="background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); color: #4ade80; margin: 20px 0;">
      Vérification du paiement...
    </div>

    <div class="status-actions" style="display: none;" id="actions">
      <a href="index.html" class="status-btn">Accéder à mon analyse</a>
    </div>

    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
      <div class="static-footer-links" style="justify-content: center;">
        <a href="mentions-legales.html" style="color: rgba(255,255,255,0.5);">Mentions légales</a>
        <a href="politique-confidentialite.html" style="color: rgba(255,255,255,0.5);">Politique de confidentialité</a>
      </div>
    </div>
  </div>

<script>
  const API_BASE_URL = "https://instascore-production.up.railway.app";

  (async function () {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");
    
    if (!sessionId) {
      document.getElementById('status').style.cssText = "background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); color: #f87171;";
      document.getElementById('status').textContent = "Session invalide";
      document.getElementById('actions').style.display = "flex";
      return;
    }

    try {
      const res = await fetch(`${API_BASE_URL}/api/checkout-success?session_id=${encodeURIComponent(sessionId)}`);
      const data = await res.json();

      if (!data.success || !data.premiumToken) throw new Error();

      localStorage.setItem("instascore_premium_token", data.premiumToken);
      document.getElementById('status').textContent = "Accès activé ! Redirection...";
      
      setTimeout(() => {
        window.location.href = `index.html?premium_token=${encodeURIComponent(data.premiumToken)}`;
      }, 1000);
    } catch (err) {
      console.error(err);
      document.getElementById('status').style.cssText = "background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); color: #f87171;";
      document.getElementById('status').textContent = "Erreur d'activation";
      document.getElementById('actions').style.display = "flex";
    }
  })();
</script>


</body>
</html>
